<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:var(--bg);}
  .row{display:grid;grid-template-columns:64px 60px 1fr;gap:14px;align-items:center;padding:6px 0;border-bottom:1px solid var(--hair);font-family:var(--mono);}
  .row:last-child{border-bottom:0;}
  .tk{font-size:11px;font-weight:600;color:var(--ink);letter-spacing:.04em;}
  .px{font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums;}
  .bar{height:14px;background:var(--ink);}
  .use{font-size:10.5px;color:var(--ink-3);margin-left:8px;letter-spacing:0;text-transform:none;font-family:var(--sans);}
</style>
</head><body>
  <div class="row"><span class="tk">space-1</span><span class="px">4px</span><div style="display:flex;align-items:center"><div class="bar" style="width:4px"></div><span class="use">미세 간격</span></div></div>
  <div class="row"><span class="tk">space-2</span><span class="px">8px</span><div style="display:flex;align-items:center"><div class="bar" style="width:8px"></div><span class="use">컴팩트 (chip 사이)</span></div></div>
  <div class="row"><span class="tk">space-3</span><span class="px">12px</span><div style="display:flex;align-items:center"><div class="bar" style="width:12px"></div><span class="use">기본</span></div></div>
  <div class="row"><span class="tk">space-4</span><span class="px">16px</span><div style="display:flex;align-items:center"><div class="bar" style="width:16px"></div><span class="use">표준</span></div></div>
  <div class="row"><span class="tk">space-5</span><span class="px">20px</span><div style="display:flex;align-items:center"><div class="bar" style="width:20px"></div><span class="use">모바일 섹션 padding</span></div></div>
  <div class="row"><span class="tk">space-6</span><span class="px">24px</span><div style="display:flex;align-items:center"><div class="bar" style="width:24px"></div><span class="use">데스크톱 섹션 padding</span></div></div>
  <div class="row"><span class="tk">space-8</span><span class="px">32px</span><div style="display:flex;align-items:center"><div class="bar" style="width:32px"></div><span class="use">큰 섹션</span></div></div>
  <div class="row"><span class="tk">space-12</span><span class="px">48px</span><div style="display:flex;align-items:center"><div class="bar" style="width:48px"></div><span class="use">hero 패딩</span></div></div>
  <div class="row"><span class="tk">space-16</span><span class="px">64px</span><div style="display:flex;align-items:center"><div class="bar" style="width:64px"></div><span class="use">화면 분리</span></div></div>
</body></html>
