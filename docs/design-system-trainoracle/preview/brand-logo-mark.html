<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--sans);display:grid;grid-template-columns:1.6fr 1fr;gap:0;border:1px solid var(--line);}
  body{border:0;min-height:calc(100vh - 48px);}
  .a{padding:24px 26px;border-right:1px solid var(--line);}
  .b{padding:24px 26px;background:var(--ink);color:var(--bg);}
  .lb{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:18px;}
  .b .lb{color:rgba(255,255,255,.5);}
  .wm{font-family:var(--sans);font-weight:600;font-size:36px;letter-spacing:.04em;color:var(--ink);line-height:1;}
  .b .wm{color:#fff;}
  .wm .d{display:inline-block;width:5px;height:5px;background:var(--brand);border-radius:50%;margin:0 3px;transform:translateY(-6px);}
  .tag{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase;margin-top:12px;}
  .b .tag{color:rgba(255,255,255,.55);}
  .clear{font-family:var(--mono);font-size:10px;color:var(--ink-4);letter-spacing:.06em;margin-top:24px;line-height:1.5;}
  .b .clear{color:rgba(255,255,255,.4);}
  .mark{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:.08em;color:#fff;}
  .mark .d{width:8px;height:8px;background:var(--brand);border-radius:50%;}
</style>
</head><body>
  <div class="a">
    <div class="lb">— Wordmark · light</div>
    <span class="wm">TRAIN<span class="d"></span>O<span class="d"></span>RACLE</span>
    <div class="tag">thinking tool for elite endurance</div>
    <div class="clear">CLEAR SPACE · ≥ height of brand dot on every side · never stretch · never colorize letters</div>
  </div>
  <div class="b">
    <div class="lb">— AI persona mark · dark</div>
    <span class="mark"><span class="d"></span>JH</span>
    <div class="tag" style="margin-top:18px;">Coach Jang AI 식별 마크</div>
    <div class="clear">No avatar illustration. 사람 그림 X — 신뢰성 ↓ 위험. dot · 2 letters만.</div>
  </div>
</body></html>
