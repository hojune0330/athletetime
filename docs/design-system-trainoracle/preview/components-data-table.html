<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 28px;background:var(--bg);}
  .lb{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px;}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-variant-numeric:tabular-nums;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);}
  tr{border-bottom:1px dashed var(--hair);}
  tr:last-child{border-bottom:0;}
  td{padding:9px 0;}
  td.l{color:var(--ink-3);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;width:50%;}
  td.v{text-align:right;font-size:14px;font-weight:500;color:var(--ink);letter-spacing:-0.01em;}
  td.v .u{color:var(--ink-3);font-size:11px;font-weight:400;margin-left:3px;}
</style>
</head><body>
  <div class="lb">— Data table (key-value, dashed dividers)</div>
  <table>
    <tr><td class="l">Total volume</td><td class="v">10.4<span class="u">km</span></td></tr>
    <tr><td class="l">Duration</td><td class="v">62<span class="u">min</span></td></tr>
    <tr><td class="l">Avg HR</td><td class="v">182<span class="u">bpm</span></td></tr>
    <tr><td class="l">Pace target</td><td class="v">3'20"<span class="u">/km</span></td></tr>
    <tr><td class="l">TSS</td><td class="v">124</td></tr>
    <tr><td class="l">Cycle position</td><td class="v">D-5 / 9.5</td></tr>
  </table>
</body></html>
