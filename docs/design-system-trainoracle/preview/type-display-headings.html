<!doctype html>
<html><head><meta charset="utf-8"/>

</head><body>
  <div class="row">
    <div class="lb">Display</div>
    <div><span class="ex" style="font-family:var(--sans);font-size:56px;font-weight:500;letter-spacing:-0.045em;line-height:1;">Thinking, not tracking.</span></div>
  </div>
  <div class="row">
    <div class="lb">H1</div>
    <div><span class="ex" style="font-family:var(--sans);font-size:36px;font-weight:500;letter-spacing:-0.03em;line-height:1.1;">9.5-day Cycle Methodology</span></div>
  </div>
  <div class="row">
    <div class="lb">H2</div>
    <div><span class="ex" style="font-family:var(--sans);font-size:24px;font-weight:500;letter-spacing:-0.02em;line-height:1.2;">D-5 · MAIN · VO2-Long</span></div>
  </div>
  <div class="row">
    <div class="lb">H3</div>
    <div><span class="ex" style="font-family:var(--sans);font-size:18px;font-weight:600;letter-spacing:-0.01em;">Why this session</span></div>
  </div>
