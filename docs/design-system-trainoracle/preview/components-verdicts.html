<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--bg);font-family:var(--sans);}
  .lb{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px;}
  .row{display:flex;flex-wrap:wrap;gap:18px 26px;align-items:center;margin-bottom:18px;}
  .item{display:flex;flex-direction:column;gap:6px;}
  .desc{font-family:var(--mono);font-size:9.5px;color:var(--ink-4);letter-spacing:.04em;text-transform:uppercase;}
  .confbar{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;}
  .confbar .track{width:90px;height:3px;background:var(--hair);position:relative;}
  .confbar .track .fill{height:100%;background:var(--ink);}
</style>
</head><body>
  <div class="lb">— 4-state verdict (모든 AI 발언에 필수)</div>
  <div class="row">
    <div class="item">
      <span class="verdict confirm">CONFIRM · 100%</span>
      <span class="desc">사실 기반 · 측정값</span>
    </div>
    <div class="item">
      <span class="verdict recommend">RECOMMEND · 87%</span>
      <span class="desc">근거 있는 권장</span>
    </div>
    <div class="item">
      <span class="verdict unc">UNC · 72%</span>
      <span class="desc">신호 충돌 · 판정 불확실</span>
    </div>
    <div class="item">
      <span class="verdict lack">LACK · n/a</span>
      <span class="desc">데이터 부족 · &lt;14일</span>
    </div>
  </div>
  <div style="border-top:1px dashed var(--hair);padding-top:14px;">
    <div class="lb">— Confidence indicator</div>
    <div class="confbar"><span style="color:var(--ink);font-weight:600;">87%</span><div class="track"><div class="fill" style="width:87%"></div></div><span>신뢰도</span></div>
    <div class="confbar" style="margin-top:8px;"><span style="color:var(--ink);font-weight:600;">42%</span><div class="track"><div class="fill" style="width:42%;background:var(--warn);"></div></div><span>신뢰도 · 낮음 → 코치 이관</span></div>
  </div>
</body></html>
