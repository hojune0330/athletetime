<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--sans);}
  .sec{display:flex;gap:22px;align-items:flex-end;}
  .sec + .sec{margin-top:24px;border-top:1px dashed var(--hair);padding-top:18px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:56px;height:56px;border:1px solid var(--ink);background:var(--surface);}
  .lb{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);}
  .px{font-family:var(--mono);font-size:10px;color:var(--ink-3);}
  .stroke{height:0;border-top:1px solid;width:140px;}
  h4{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin:0 14px 0 0;width:80px;text-align:right;}
  .row{display:flex;align-items:center;gap:18px;margin-bottom:10px;}
  .swatch{font-family:var(--mono);font-size:10px;color:var(--ink-3);}
</style>
</head><body>
  <div class="sec">
    <h4>Radius</h4>
    <div class="cell"><div class="box" style="border-radius:0"></div><div class="lb">r-0</div><div class="px">0 · default</div></div>
    <div class="cell"><div class="box" style="border-radius:2px"></div><div class="lb">r-sm</div><div class="px">2px</div></div>
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="lb">r-md</div><div class="px">4px · max</div></div>
    <div class="cell"><div class="box" style="border-radius:50%;background:var(--ink)"></div><div class="lb">avatar</div><div class="px">50% · 예외</div></div>
    <div style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--err);letter-spacing:.06em;align-self:flex-end;padding-bottom:24px;">▸ 8px 이상 사용 금지</div>
  </div>
  <div class="sec" style="display:block">
    <h4 style="margin-bottom:12px;text-align:left;width:auto;">Border weights</h4>
    <div class="row"><div class="stroke" style="border-top-color:#E8E6DF;border-top-width:1px"></div><div class="lb">bw-hair</div><div class="swatch">1px · #E8E6DF · row dividers</div></div>
    <div class="row"><div class="stroke" style="border-top-color:#D9D6CE;border-top-width:1px"></div><div class="lb">bw-line</div><div class="swatch">1px · #D9D6CE · default border</div></div>
    <div class="row"><div class="stroke" style="border-top-color:#0E1412;border-top-width:1px"></div><div class="lb">bw-bold</div><div class="swatch">1px · #0E1412 · solid emphasis</div></div>
    <div class="row"><div class="stroke" style="border-top-color:#0D5F5A;border-top-width:1.5px"></div><div class="lb">bw-under</div><div class="swatch">1.5px · brand · energy underline</div></div>
    <div class="row"><div class="stroke" style="border-top-color:#B4530C;border-top-width:2px"></div><div class="lb">bw-strip</div><div class="swatch">2px · semantic · left strip (inbox)</div></div>
  </div>
</body></html>
