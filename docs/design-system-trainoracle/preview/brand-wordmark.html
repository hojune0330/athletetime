<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;flex-direction:column;gap:20px;justify-content:center;align-items:center;min-height:calc(100vh - 48px);}
  .row{display:flex;align-items:center;gap:14px;}
  .row .lb{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;width:90px;}
  .wm{font-family:var(--sans);font-size:22px;font-weight:600;letter-spacing:.04em;color:var(--ink);}
  .wm .d{display:inline-block;width:3px;height:3px;background:var(--brand);border-radius:50%;margin:0 2px;transform:translateY(-3px);}
  .wm-inv{padding:8px 14px;background:var(--ink);color:var(--bg);}
  .mark{display:inline-flex;align-items:center;gap:8px;}
  .mark .d{width:6px;height:6px;background:var(--brand);border-radius:50%;}
  .mark .c{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.08em;}
</style>
</head><body>
  <div class="row">
    <span class="lb">Wordmark</span>
    <span class="wm">TRAIN<span class="d"></span>O<span class="d"></span>RACLE</span>
  </div>
  <div class="row">
    <span class="lb">Inverted</span>
    <span class="wm wm-inv">TRAIN<span class="d"></span>O<span class="d"></span>RACLE</span>
  </div>
  <div class="row">
    <span class="lb">AI Mark</span>
    <span class="mark"><span class="d"></span><span class="c">JH</span></span>
    <span style="font-family:var(--mono);font-size:10px;color:var(--ink-4);letter-spacing:.1em;">— AI persona sign, no avatar illustration</span>
  </div>
</body></html>
