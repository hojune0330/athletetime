# AthleteTime — Netlify 프론트엔드 호스팅 설정 (2026 신규 서비스 레이아웃)
#
# 아키텍처:
#   Netlify  : React SPA 정적 호스팅 (frontend/ → community/ 빌드 산출물)
#   Render   : 통합 Express 서버 (src/server.js) — API + WebSocket + SPA 셀프호스팅(예비)
#
# 주의:
#   - vite.config.ts 의 outDir 이 '../community' 이므로 publish 는 repo 루트 기준 community
#   - Netlify 리다이렉트는 WebSocket 을 프록시하지 못한다 →
#     채팅은 VITE_WS_URL 로 Render 에 직접 연결 (빌드 타임 주입)

[build]
  command = "cd frontend && npm ci && npm run build"
  publish = "community"

[build.environment]
  NODE_VERSION = "20"
  # API는 Netlify 프록시(/api/*)를 타므로 같은 origin (빈 값)
  VITE_API_BASE_URL = ""
  # WebSocket 은 프록시 불가 → Render 직접 연결
  VITE_WS_URL = "wss://athletetime-backend.onrender.com/ws/chat"
  VITE_MODE = "production"

# ── API 프록시 (SPA 폴백보다 먼저, force 로 강제) ──
[[redirects]]
  from = "/api/*"
  to = "https://athletetime-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://athletetime-backend.onrender.com/health"
  status = 200
  force = true

# ── React SPA 폴백 ──
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── 캐싱 ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── 보안 헤더 ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://cdn.jsdelivr.net https://fonts.gstatic.com; connect-src 'self' https://athletetime-backend.onrender.com wss://athletetime-backend.onrender.com https://fonts.googleapis.com https://fonts.gstatic.com;"
