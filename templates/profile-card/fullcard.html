<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width={{width}}">
  <title>프로필 카드 - Fullcard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #111111;
      --white: #FFFFFF;
      --gray-200: #E5E5E5;
      --gray-400: #999999;
      --gray-600: #666666;
      --naver-green: #03C75A;
    }

    body { margin: 0; padding: 0; background: #000; }

    .profile-card {
      width: {{width}}px;
      height: {{height}}px;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* 상단 바 (대회 + 종목) */
    .full__header {
      background: var(--black);
      color: var(--white);
      padding: 40px 52px 32px;
      flex-shrink: 0;
    }

    .full__comp {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .full__event {
      font-size: 40px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -1.5px;
      line-height: 1.08;
    }

    /* 중앙 사진 */
    .full__photo {
      flex: 1;
      background-image: url('{{photoUrl}}');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* 사진 위에 올라가는 순위 배지 */
    .full__rank-badge {
      position: absolute;
      top: 24px;
      right: 28px;
      width: 80px;
      height: 80px;
      background: var(--naver-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .full__rank-badge-label {
      font-size: 10px;
      font-weight: 800;
      color: rgba(0,0,0,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .full__rank-badge-value {
      font-size: 40px;
      font-weight: 900;
      color: var(--black);
      line-height: 1;
      margin-top: -2px;
    }

    /* 하단 데이터 바 */
    .full__data {
      background: var(--black);
      color: var(--white);
      padding: 28px 52px 36px;
      flex-shrink: 0;
    }

    .full__athlete-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .full__athlete-info {
      display: flex;
      flex-direction: column;
    }

    .full__athlete-name {
      font-size: 34px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -0.5px;
    }

    .full__athlete-aff {
      font-size: 18px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    .full__record-info {
      text-align: right;
    }

    .full__record-value {
      font-size: 54px;
      font-weight: 900;
      color: var(--naver-green);
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      line-height: 1;
    }

    .full__record-unit {
      font-size: 20px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
    }

    .full__record-wind {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }

    /* 하단 메타 */
    .full__meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    .full__meta-text {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }

    .full__brand {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.25);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* 코멘트 */
    .full__comment {
      margin-top: 14px;
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      font-style: italic;
      line-height: 1.45;
    }
  </style>
</head>
<body>
<div class="profile-card">
  <div class="full__header">
    <div class="full__comp">{{competition}}</div>
    <div class="full__event">{{event}}</div>
  </div>
  <div class="full__photo">
    <div class="full__rank-badge">
      <div class="full__rank-badge-label">RANK</div>
      <div class="full__rank-badge-value">{{rank}}</div>
    </div>
  </div>
  <div class="full__data">
    <div class="full__athlete-row">
      <div class="full__athlete-info">
        <div class="full__athlete-name">{{name}}</div>
        <div class="full__athlete-aff">{{affiliation}}</div>
      </div>
      <div class="full__record-info">
        <div class="full__record-value">{{record}}<span class="full__record-unit">{{recordUnit}}</span></div>
        {{#hasWind}}<div class="full__record-wind">풍속 {{wind}} m/s</div>{{/hasWind}}
      </div>
    </div>
    {{#hasComment}}<div class="full__comment">"{{comment}}"</div>{{/hasComment}}
    <div class="full__meta">
      <span class="full__meta-text">{{date}} · {{venue}}</span>
      <span class="full__brand">AthleTime</span>
    </div>
  </div>
</div>
</body>
</html>
